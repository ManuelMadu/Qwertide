<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qwertide - a typing-speed game in .NET</title>
    <meta name="description" content="Type a passage, get live WPM and accuracy, climb the leaderboard. Built in C# / Blazor WebAssembly." />
    <meta name="color-scheme" content="dark" />
    <base href="/" />

    <!-- Fonts. NOTE: <link> to Google Fonts is fine for dev; for production,
         self-host JetBrains Mono + Space Grotesk (fontsource) per perf budget. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- MudBlazor base (themed dark in QwertideTheme) -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <!-- Qwertide design system (loads after Mud so our tokens win) -->
    <link rel="stylesheet" href="css/qwertide.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Qwertide.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#0e0e10;color:#e2b340;font-family:'JetBrains Mono',monospace;letter-spacing:-0.02em;font-size:1.1rem;">
            qwertide<span style="color:#44444c">_</span>
        </div>
    </div>

    <div id="blazor-error-ui" style="font-family:monospace;">
        Something broke.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">x</a>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="js/qwertide.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
